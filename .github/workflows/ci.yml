name: CI

on:
  push:
    branches-ignore: [gh-pages]
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy type-check
        run: mypy src

  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fast tests
        run: pytest -m "not slow" -v --tb=short
      - name: Run smoke test (lief_capstone backend)
        run: |
          python -c "
          from bainary.lift import lift
          from bainary.graph import CallGraph
          a = lift('tests/fixtures/loops_elf64/loops.elf', backend='lief_capstone', use_cache=False)
          cg = CallGraph.from_artifact(a)
          assert cg.node_count > 0
          print(f'Smoke OK: {cg.node_count} nodes, {cg.edge_count} edges')
          "

  test-slow:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Cache Ghidra
        id: cache-ghidra
        uses: actions/cache@v4
        with:
          path: /home/runner/tools/ghidra
          key: ghidra-11.3.2
      - name: Download Ghidra
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          GHIDRA_HOME="$HOME/tools/ghidra"
          mkdir -p "$(dirname "$GHIDRA_HOME")"
          curl -L -o /tmp/ghidra.zip \
            https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.3.2_build/ghidra_11.3.2_PUBLIC_20250415.zip
          unzip -q /tmp/ghidra.zip -d /tmp
          mv /tmp/ghidra_11.3.2_PUBLIC "$GHIDRA_HOME"
          rm /tmp/ghidra.zip
          ls "$GHIDRA_HOME/support/analyzeHeadless"
      - name: Use cached Ghidra
        if: steps.cache-ghidra.outputs.cache-hit == 'true'
        run: |
          ls /home/runner/tools/ghidra/support/analyzeHeadless
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run slow tests (Ghidra integration)
        env:
          GHIDRA_HOME: /home/runner/tools/ghidra
        run: pytest -v --tb=short
      - name: Run end-to-end smoke test
        env:
          GHIDRA_HOME: /home/runner/tools/ghidra
        run: |
          python -c "
          from bainary.lift import lift
          from bainary.graph import CallGraph
          a = lift('tests/fixtures/loops_elf64/loops.elf', backend='ghidra_headless', use_cache=False)
          cg = CallGraph.from_artifact(a)
          main = [n for n in cg.functions.values() if n.name == 'main']
          assert len(main) == 1
          assert len(cg.callees_of('main')) >= 2  # add, mul, printf
          print(f'Ghidra smoke OK: {cg.node_count} nodes, {cg.edge_count} edges, main calls {sorted(cg.callees_of(\"main\"))}')
          "

  dependency-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Run pip-audit
        continue-on-error: true
        run: pip-audit
